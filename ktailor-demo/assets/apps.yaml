---
#
# kTailor demo application - modifying env var
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insert-env-app
  namespace: default
#  labels:
#    ktailor.dev/fit: "central.ktailor-test"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insert-env-app
  template:
    metadata:
      labels:
        app: insert-env-app
    spec:
      containers:
      - name: insert-env-app
        image: alpine:latest
        command: ["/bin/sh", "-c"]
        args:
          - "while true; do echo \"$(date) - KTAILORTEST: ${KTAILORTEST}\"; sleep 3; done"
        env:
          - name: KTAILORTEST
            value: "This text will be overwritten by kTailor."

---
#
# kTailor time travel demo application
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timetravel-app
  namespace: default
#  labels:
#    ktailor.dev/fit: "local.lft-plus222d"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timetravel
  template:
    metadata:
      labels:
        app: timetravel
    spec:
      containers:
      - name: timetravel
        image: debian:bookworm-slim
        command: ["bash", "-c", "while true ; do date ; sleep 2 ; done "]
