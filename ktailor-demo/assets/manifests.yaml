apiVersion: v1
kind: Service
metadata:
  name: ktailor
  namespace: ktailor
spec:
  ports:
  - port: 443
    targetPort: 8443
  selector:
    app: ktailor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ktailor
  namespace: ktailor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ktailor
  template:
    metadata:
      labels:
        app: ktailor
    spec:
      serviceAccountName: ktailor
      containers:
      - name: ktailor
        image: katalytic/ktailor:latest
        ports:
        - containerPort: 8443
        volumeMounts:
        - name: certs
          mountPath: /etc/ktailor/certs
          readOnly: true
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      volumes:
      - name: certs
        secret:
          secretName: ktailor-webhook-certs
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: ktailor
  annotations:
    cert-manager.io/inject-ca-from: ktailor/ktailor-serving-cert
webhooks:
- name: mutate.ktailor.dev
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: ktailor
      namespace: ktailor
      path: /mutate
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: ["apps"]
    apiVersions: ["v1"]
    resources: ["deployments"]
  sideEffects: None
