apiVersion: v1
kind: ServiceAccount
metadata:
  name: ktailor
  namespace: ktailor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ktailor
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ktailor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ktailor
subjects:
- kind: ServiceAccount
  name: ktailor
  namespace: ktailor
