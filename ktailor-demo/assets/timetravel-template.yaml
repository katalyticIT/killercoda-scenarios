apiVersion: v1
kind: ConfigMap
metadata:
  name: lft-plus222d
  namespace: default
  labels:
    ktailor.dev/template: "true"
data:
  template: |
    modifyContainers:
      insertIfNotExists:
        volumeMounts:
          - name: shared-lft-volume
            mountPath: /lft_volume
      insertOrOverwrite:
        env:
          - name: FAKETIME
            value: "+222d"
      setOrAppend:
        env:
          - name: LD_PRELOAD
            value: "/lft_volume/libfaketime.so.1"
            separator: ":"
    addInitContainers:
      - name: inject-libfaketime
        image: katalytic/libfaketime_init:1.0
        env:
          - name: LFT_DESTPATH
            value: /lft_volume
        volumeMounts:
        - name: shared-lft-volume
          mountPath: /lft_volume
    addVolumes:
      volumes:
        - name: shared-lft-volume
          emptyDir: {}
